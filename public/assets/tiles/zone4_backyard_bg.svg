<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a40"/>
      <stop offset="100%" stop-color="#121820"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#night)"/>
  <!-- Subtle campus quad perspective -->
  <path d="M0 520 L960 380 L1920 520 V1080 H0 Z" fill="url(#floor)" opacity="0.85"/>
  <g opacity="0.35" stroke="#4a6fa5" stroke-width="2" fill="none">
    <line x1="0" y1="600" x2="1920" y2="600"/><line x1="0" y1="680" x2="1920" y2="680"/>
    <line x1="0" y1="760" x2="1920" y2="760"/><line x1="0" y1="840" x2="1920" y2="840"/>
  </g>
  <!-- Equalizer / music bars -->
  <g opacity="0.5" transform="translate(120 120)">
    <rect x="0" y="80" width="28" height="120" rx="4" fill="#6b9fff"/>
    <rect x="40" y="40" width="28" height="160" rx="4" fill="#9b7bff"/>
    <rect x="80" y="60" width="28" height="140" rx="4" fill="#ff7b9b"/>
    <rect x="120" y="20" width="28" height="180" rx="4" fill="#7bffce"/>
    <rect x="160" y="50" width="28" height="150" rx="4" fill="#ffd77b"/>
  </g>
  <!-- Tech grid -->
  <g opacity="0.12" stroke="#7bffce" stroke-width="1">
    <path d="M0 0 L1920 1080 M1920 0 L0 1080"/>
    <path d="M320 0 V1080 M640 0 V1080 M960 0 V1080 M1280 0 V1080 M1600 0 V1080"/>
  </g>
  <!-- Modest treble clef hint -->
  <g transform="translate(1620 200) scale(0.35)" opacity="0.2" fill="none" stroke="#e0e8ff" stroke-width="8">
    <path d="M40 200 C40 80 120 80 120 160 C120 240 40 240 40 120 C40 40 200 40 200 200 L200 400"/>
  </g>
  <text x="24" y="42" fill="#b8d4ff" font-family="system-ui, sans-serif" font-size="14" opacity="0.9">STUDIO CAMPUS</text>
  <text x="24" y="62" fill="#7bffce" font-family="system-ui, sans-serif" font-size="10" opacity="0.65">AUDIO · SYNC · LATE LAB</text>
</svg>
